<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Xiao Li</title>
    <meta name="description" content="Page not found — Xiao Li artist portfolio.">
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .not-found {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .not-found-inner {
            padding: 40px;
        }
        .not-found h6 {
            font-size: 6rem;
            font-family: var(--font-display, 'Playfair Display', serif);
            color: var(--color-accent, #d4b17f);
            line-height: 1;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .not-found h1 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        .not-found p {
            font-style: italic;
            max-width: 480px;
            margin: 0 auto 30px;
        }
    </style>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFL3HFQSGD"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-KFL3HFQSGD');
    </script>
</head>
<body>

    <nav>
        <div class="nav-content">
            <h2>Xiao Li</h2>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="statement.html">Statement</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
                <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">◐ Dark</button>
            </div>
        </div>
    </nav>

    <section class="not-found">
        <div class="not-found-inner">
            <h6>404</h6>
            <h1>Page Not Found</h1>
            <p>The page you're looking for doesn't exist — or perhaps it has moved, like all things, through time and space.</p>
            <a href="index.html" class="btn">Return Home</a>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>Copyright &copy; 2026 Xiao Li | Los Angeles</p>
            <div class="footer-links">
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Use</a>
            </div>
        </div>
    </footer>

    <script>
        const toggle = document.getElementById('darkToggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            toggle.textContent = '◑ Light';
        }
        toggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            toggle.textContent = isDark ? '◑ Light' : '◐ Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>

</body>
</html>
