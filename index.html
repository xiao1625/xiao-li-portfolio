    <link rel="preload" href="https://drive.google.com/thumbnail?id=1FhZZAE6MZiF5Yu2nk6VOKHeOzje-zFa1&sz=w1600" as="image" fetchpriority="high">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">


    <!-- Internal styles for page-specific tweaks -->
    <style>
        .hero-tagline span {
            display: inline-block;
            padding: 0 12px;
            border-right: 1px solid var(--color-accent);
        }
        .hero-tagline span:last-child {
            border-right: none;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .footer-links {
            display: flex;
            gap: 24px;
        }
        .footer-links a {
            color: #888;
            font-size: 0.85rem;
        }
        .footer-links a:hover {
            color: var(--color-accent, #d4b17f);
        }
        footer p { margin-bottom: 0; font-size: 0.85rem; }

        /* Background image on hero */
        .hero {
            background-color: #e8e4ec;
            background-image: url('https://drive.google.com/thumbnail?id=1FhZZAE6MZiF5Yu2nk6VOKHeOzje-zFa1&sz=w1600');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(250, 244, 230, 0.55);
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease;
        }
        body.dark-mode .hero::after {
            background: rgba(26, 22, 18, 0.75);     /* 较深的暗色 overlay */
        }
        .hero-content {
            position: relative;
            z-index: 1;
        }

        /* Pull footer closer */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .hero { flex: 1; }
        footer { margin-top: 0; }
    </style>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFL3HFQSGD"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-KFL3HFQSGD');
    </script>
</head>
<body>

    <nav>
        <div class="nav-content">
            <h2>Xiao Li</h2>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="about.html">About</a>
                <a href="statement.html">Statement</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
                <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">◐ Dark</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Xiao Li</h1>
            <h2>Interdisciplinary Artist</h2>
            <p class="hero-tagline">
                <span>Installation</span>
                <span>Audiovisual</span>
                <span>Generative Art</span>
            </p>
            <a href="projects.html" class="btn">Explore My Work</a>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>Copyright &copy; 2026 Xiao Li | Los Angeles</p>
            <div class="footer-links">
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Use</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </footer>

    <script>
        // Dark / Light Mode Toggle (Bonus)
        const toggle = document.getElementById('darkToggle');
        const body = document.body;

        // Remember preference
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            toggle.textContent = '◑ Light';
        }

        toggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            toggle.textContent = isDark ? '◑ Light' : '◐ Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>

</body>
</html>
